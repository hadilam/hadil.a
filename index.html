  <body>

    <div id="splash">

    <!-- 2. Main Simulation Header -->
    <div class="stepbody">

        <a href="index.html"><img class="logo" src="assets/wIcon.png" alt="symbol logo"></a>

            <canvas id="canvas"></canvas>

    <!-- 4. Footer & Navigation Area -->
    <footer class="site-footer">
      <div class="info-row">
        <span class="left-age">I am <span id="age-counter">18.00000000000000</span> years old.</span>
        <div class="right-links">
          <a href="https://www.instagram.com/haadilrr/" class="nav-link" aria-label="Instagram" target="_blank" rel="noopener noreferrer">Ig</a>

    <!-- 5. Bottom Warm Greeting -->
    <div class="greeting">
      <p> طِـبتُ بوجودك</p>
      <p>It's Always Nice To Have You !</p>
    </div>

    <!-- 6. WebAssembly/Emscripten Engine Context Initialization -->
    <script type="text/javascript">
      var Module = {
        canvas: (function() {
          var canvas = document.getElementById('canvas');
      
          var resize = function() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
          };
      
          window.addEventListener('resize', resize);
          setTimeout(resize, 0); 
          return canvas;
        })()
      };
    </script>
    <script async src="primes_engine.js"></script>
    <script type="text/javascript">
    (function() {
      // Exact birth timing: August 12, 2008 at 4:00 AM
      const birthDate = new Date(2008, 7, 12, 4, 0); 
      const ageElement = document.getElementById('age-counter');

      function updateAgeCounter() {
        const now = new Date();
        const ageInMilliseconds = now - birthDate;
        const ageInYears = ageInMilliseconds / 31557600000; // 365.25 days total ms
      
        ageElement.textContent = ageInYears.toFixed(14);
      
        requestAnimationFrame(updateAgeCounter);
      }

      updateAgeCounter();
    })();
  </script>


  </body>
